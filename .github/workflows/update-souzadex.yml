name: Update Souzadex

on:
  push:
    branches: [main]
    paths:
      - "assets/images/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gerar souzas.js
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/generate-souzas.sh

      - name: Commitar souzas.js atualizado
        run: |
          if git diff --quiet souzas.js; then
            echo "souzas.js já está atualizado."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add souzas.js
          git commit -m "chore: atualiza souzas.js"
          git push
